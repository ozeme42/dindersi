<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders Notları</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .content-section { margin-bottom: 2rem; background: rgba(30, 41, 59, 0.5); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
        .content-section h2 { font-size: 1.5rem; font-weight: bold; color: #a78bfa; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .item { margin-bottom: 0.75rem; color: #cbd5e1; line-height: 1.6; }
        .item strong { color: #22d3ee; }
        ul .item { list-style-type: disc; list-style-position: inside; }
        #loading { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: center; align-items: center; z-index: 50; flex-direction: column; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-950/80 backdrop-blur-md border-b border-white/10 p-6 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-cyan-400">DERS NOTLARI</h1>
            <button onclick="history.back()" class="text-slate-400 hover:text-white transition text-sm flex items-center gap-1">
                <span>←</span> Geri Dön
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 w-full flex-grow">
        <div class="mb-8">
            <h1 id="page-title" class="text-3xl font-bold text-white">Yükleniyor...</h1>
        </div>

        <div id="main-container"></div>

        <div id="error-container" class="hidden p-4 bg-red-900/30 border border-red-500/50 text-red-200 rounded-lg"></div>
    </main>

    <div id="loading">
        <svg class="animate-spin h-10 w-10 text-cyan-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-white">Notlar Getiriliyor...</p>
    </div>

    <script src="yazilacaklar.js"></script>
</body>
</html>
