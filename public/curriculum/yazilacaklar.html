
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazılacaklar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <header class="bg-slate-950/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/10 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 id="topic-title" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">Yükleniyor...</h1>
            <a href="index.html" class="px-4 py-2 bg-slate-800/50 text-slate-300 hover:bg-slate-700 rounded-lg text-sm font-semibold">Ana Sayfaya Dön</a>
        </div>
    </header>
    
    <main class="max-w-7xl mx-auto p-8 space-y-12">
        <div id="content-container">
             <!-- İçerik buraya dinamik olarak eklenecek -->
        </div>
    </main>
    
    <div id="loading-indicator" class="fixed inset-0 bg-slate-950/80 z-50 flex flex-col items-center justify-center gap-4">
        <svg class="animate-spin h-12 w-12 text-cyan-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-slate-400 font-medium animate-pulse">Yazılacaklar Yükleniyor...</p>
    </div>

    <script src="yazilacaklar.js"></script>
</body>
</html>
