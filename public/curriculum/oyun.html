<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Modu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="oyun.js" defer></script>
</head>
<body class="bg-slate-900 text-slate-200">
    <div class="container mx-auto p-8">
        <header id="game-header" class="mb-8 text-center">
            <h1 id="game-title" class="text-4xl font-black text-cyan-400"></h1>
            <p id="topic-name" class="text-slate-400 text-lg"></p>
        </header>

        <main id="game-container" style="display: none;"></main>

        <div id="loading" class="text-center py-16">
            <p class="text-2xl font-bold text-cyan-400 animate-pulse">Oyun Yükleniyor...</p>
        </div>

        <div id="error-container" style="display: none;" class="text-center py-16">
            <h2 class="text-3xl font-bold text-red-500 mb-4">Bir Hata Oluştu</h2>
            <p id="error-text" class="text-slate-300"></p>
            <a href="index.html" class="mt-8 inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold">Ana Sayfaya Dön</a>
        </div>
    </div>
</body>
</html>
