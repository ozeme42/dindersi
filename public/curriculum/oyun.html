<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyunlar - Değerler Eğitimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">
    <header class="bg-slate-950/80 backdrop-blur-md border-b border-white/10 p-6 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">OYUN ALANI</h1>
            <button onclick="history.back()" class="text-slate-400 hover:text-white transition text-sm flex items-center gap-1"><span>←</span> Geri Dön</button>
        </div>
    </header>
    <main class="max-w-5xl mx-auto p-6 w-full flex-grow">
        <div class="mb-10 text-center">
            <h2 id="topic-title" class="text-4xl font-bold text-white mb-2">...</h2>
            <p class="text-slate-400">Bu konu için aktif oyunlar:</p>
        </div>
        <div id="game-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>
    <script src="oyun.js"></script>
</body>
</html>
