<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peygamberimiz ve Gençler - 2. Ünite Özeti</title>
    
    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (JSX Derleyicisi) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Animasyonlar */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .slide-in-from-bottom-4 {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Ikon Bileşenleri (Lucide-react yerine SVG kullanıldı) ---
        const IconBase = ({ children, size = 20, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const MessageCircle = (props) => <IconBase {...props}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></IconBase>;
        const Heart = (props) => <IconBase {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconBase>;
        const Star = (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const Navigation = (props) => <IconBase {...props}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconBase>;
        const CheckCircle2 = (props) => <IconBase {...props}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></IconBase>;
        const Award = (props) => <IconBase {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconBase>;
        const Lightbulb = (props) => <IconBase {...props}><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 9.5 6 4.65 4.65 0 0 0 8 11.5c0 2.76 2.5 3 5 3 .59 0 1.05-.22 1.5-.5"/></IconBase>;
        const Smile = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></IconBase>;

        // --- Ana Uygulama ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('ilkeler');
            const [showQuiz, setShowQuiz] = useState(false);
            const [score, setScore] = useState(0);
            const [currentQuestion, setCurrentQuestion] = useState(0);

            const tabs = [
                { id: 'ilkeler', label: 'İletişim İlkeleri', icon: <MessageCircle size={20} /> },
                { id: 'sahabeler', label: 'Genç Sahabeler', icon: <Users size={20} /> },
                { id: 'kavramlar', label: 'Kavram Pusulası', icon: <Navigation size={20} /> },
                { id: 'miras', label: 'Gerçek Miras', icon: <Award size={20} /> },
                { id: 'quiz', label: 'Test Et', icon: <BookOpen size={20} /> },
            ];

            const quizQuestions = [
                {
                    q: "Peygamberimizin gençlere karşı en temel yaklaşımı aşağıdakilerden hangisidir?",
                    a: ["Sert ve otoriter", "Şefkat ve merhamet temelli", "Eleştirel ve sorgulayıcı", "Sadece kuralları öğreten"],
                    correct: 1
                },
                {
                    q: "Medine'ye İslam'ı öğretmesi için gönderilen ve 'ilk öğretmen' kabul edilen genç sahabi kimdir?",
                    a: ["Muaz bin Cebel", "Zeyd bin Harise", "Musab bin Umeyr", "Ali bin Ebu Talib"],
                    correct: 2
                },
                {
                    q: "Peygamberimizin 18 yaşında ordu komutanı olarak görevlendirdiği genç sahabi kimdir?",
                    a: ["Usame bin Zeyd", "Abdullah bin Ömer", "Enes bin Malik", "Cafer bin Ebu Talib"],
                    correct: 0
                },
                {
                    q: "Görüş alışverişinde bulunma, fikir alma ve danışma anlamına gelen kavram hangisidir?",
                    a: ["Tebliğ", "Cihat", "İstişare", "Şehadet"],
                    correct: 2
                }
            ];

            const handleAnswer = (idx) => {
                if (idx === quizQuestions[currentQuestion].correct) {
                    setScore(score + 1);
                }
                if (currentQuestion < quizQuestions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    setShowQuiz(true);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-5xl mx-auto text-center mb-10 pt-4">
                        <div className="inline-block bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-sm font-bold mb-4 uppercase tracking-widest">
                            2. Ünite Özeti
                        </div>
                        <h1 className="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
                            Peygamberimizin Çevresindeki <span className="text-emerald-600">Gençler</span>
                        </h1>
                        <p className="text-lg text-slate-600 italic">
                            "Biz seni ancak alemlere rahmet olarak gönderdik." (Enbiya, 107)
                        </p>
                    </header>

                    {/* Navigation */}
                    <div className="max-w-5xl mx-auto mb-8">
                        <div className="flex flex-wrap justify-center gap-2 border-b border-slate-200">
                            {tabs.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-6 py-3 font-semibold transition-all duration-300 border-b-2 ${
                                        activeTab === tab.id 
                                        ? 'border-emerald-500 text-emerald-600 bg-emerald-50/50' 
                                        : 'border-transparent text-slate-500 hover:text-emerald-500'
                                    }`}
                                >
                                    {tab.icon}
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Content Area */}
                    <main className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl shadow-emerald-100/50 border border-slate-100 p-6 md:p-10 min-h-[500px]">
                        
                        {/* İlkeler Section */}
                        {activeTab === 'ilkeler' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h2 className="text-2xl font-bold mb-8 flex items-center gap-2 text-slate-900">
                                    <MessageCircle className="text-emerald-500" /> Gençlerle İletişimin Temelleri
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {[
                                        { title: 'Şefkat ve Merhamet', desc: 'Hatalı davrandıklarında bile kırmadan, yumuşak bir dille uyarırdı. Enes bin Malik\'e 10 yıl boyunca bir kez bile "Öf" dememiştir.', color: 'bg-rose-50 border-rose-200 text-rose-700' },
                                        { title: 'Güven ve Sorumluluk', desc: 'Gençlerin yeteneklerini keşfeder ve onlara yaşlarından büyük sorumluluklar verirdi (Yemen\'e kadı, orduya komutan atamak gibi).', color: 'bg-blue-50 border-blue-200 text-blue-700' },
                                        { title: 'Değer Verme', desc: 'Gençleri ciddiye alır, onları dinler ve fikirlerine değer verirdi. Onlarla şakalaşır, selamlaşır ve her karşılaştığında gülümserdi.', color: 'bg-emerald-50 border-emerald-200 text-emerald-700' },
                                        { title: 'Kolaylaştırıcı Yaklaşım', desc: 'İnsanları usandırmaz, "Zorlaştırıcı değil, kolaylaştırıcı bir öğretmen olarak gönderildim" buyururdu.', color: 'bg-amber-50 border-amber-200 text-amber-700' },
                                    ].map((item, i) => (
                                        <div key={i} className={`p-6 rounded-2xl border-l-4 ${item.color} shadow-sm`}>
                                            <h3 className="font-bold text-lg mb-2">{item.title}</h3>
                                            <p className="text-slate-700 text-sm leading-relaxed">{item.desc}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-8 bg-slate-50 p-6 rounded-2xl flex items-start gap-4">
                                    <Smile className="text-emerald-500 shrink-0 mt-1" />
                                    <div>
                                        <p className="font-semibold text-slate-800 italic">"Müslüman olduğum günden beri Resulullah beni hiç kapıdan çevirmedi. Beni her gördüğünde mutlaka gülümserdi."</p>
                                        <p className="text-sm text-slate-500 mt-1">— Cerir bin Abdullah (ra)</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Sahabeler Section */}
                        {activeTab === 'sahabeler' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h2 className="text-2xl font-bold mb-8 flex items-center gap-2 text-slate-900">
                                    <Users className="text-emerald-500" /> Örnek Genç Sahabeler
                                </h2>
                                <div className="space-y-6">
                                    <div className="group bg-white border border-slate-200 p-6 rounded-2xl hover:border-emerald-300 transition-all">
                                        <div className="flex flex-col md:flex-row gap-6">
                                            <div className="w-full md:w-48 h-32 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600 font-bold text-center p-4">
                                                İslam'ın İlk Öğretmeni
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">Musab bin Umeyr (ra)</h3>
                                                <p className="text-slate-600 text-sm leading-relaxed">Varlıklı bir aileden gelmesine rağmen İslam için her şeyden vazgeçti. Medine'ye hicretten önce giderek orayı İslam'a hazırladı. Uhud'da şehit düştü.</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="group bg-white border border-slate-200 p-6 rounded-2xl hover:border-blue-300 transition-all">
                                        <div className="flex flex-col md:flex-row gap-6">
                                            <div className="w-full md:w-48 h-32 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 font-bold text-center p-4">
                                                Yemen'in Genç Kadısı
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">Muaz bin Cebel (ra)</h3>
                                                <p className="text-slate-600 text-sm leading-relaxed">Kur'an'ı en iyi bilenlerden biriydi. Peygamberimiz onu genç yaşta Yemen'e kadı (hâkim) ve öğretmen olarak göndererek büyük bir sorumluluk verdi.</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="group bg-white border border-slate-200 p-6 rounded-2xl hover:border-amber-300 transition-all">
                                        <div className="flex flex-col md:flex-row gap-6">
                                            <div className="w-full md:w-48 h-32 bg-amber-100 rounded-xl flex items-center justify-center text-amber-600 font-bold text-center p-4">
                                                Mekke'nin Müezzini
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">Ebu Mahzure (ra)</h3>
                                                <p className="text-slate-600 text-sm leading-relaxed">Önce ezanı alaya almıştı; ancak Peygamberimizin onun sesini beğenip başını okşaması ve dua etmesiyle kalbi yumuşadı. Müslüman oldu ve Mekke müezzini yapıldı.</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="group bg-white border border-slate-200 p-6 rounded-2xl hover:border-rose-300 transition-all">
                                        <div className="flex flex-col md:flex-row gap-6">
                                            <div className="w-full md:w-48 h-32 bg-rose-100 rounded-xl flex items-center justify-center text-rose-600 font-bold text-center p-4">
                                                Kahraman Nesibe (ra)
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">Ümmü Umâre (Nesibe)</h3>
                                                <p className="text-slate-600 text-sm leading-relaxed">Uhud Savaşı'nda Peygamberimizi korumak için canı pahasına siper oldu. Peygamberimiz onun bu kahramanlığını her yöne dönse onu savaşırken gördüğünü belirterek takdir etmiştir.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Kavramlar Section */}
                        {activeTab === 'kavramlar' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h2 className="text-2xl font-bold mb-8 flex items-center gap-2 text-slate-900">
                                    <Navigation className="text-emerald-500" /> Ünite Kavramları
                                </h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {[
                                        { term: 'İstişare', definition: 'Karar almadan önce başkalarına danışmak, görüş alışverişinde bulunmak.', icon: '🤝' },
                                        { term: 'Şehadet', definition: 'Bir şeyin doğruluğuna inanmak ve şahitlik etmek.', icon: '📜' },
                                        { term: 'Cihat', definition: 'Allah yolunda gayret göstermek; hem düşmana karşı hem de nefsin kötü isteklerine karşı mücadele etmek.', icon: '🛡️' },
                                        { term: 'Tebliğ', definition: 'İslam mesajını insanlara eksiksiz ve doğru bir şekilde bildirmek.', icon: '📢' },
                                        { term: 'Rahmet', definition: 'Şefkat göstermek, acımak, sevgiyle yaklaşmak.', icon: '☁️' },
                                        { term: 'Asr-ı Saadet', definition: 'Peygamber Efendimizin peygamberlik görevini yürüttüğü huzur ve mutluluk çağı.', icon: '✨' },
                                    ].map((item, i) => (
                                        <div key={i} className="p-5 border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors">
                                            <div className="text-2xl mb-2">{item.icon}</div>
                                            <h4 className="font-bold text-emerald-700 text-lg mb-1">{item.term}</h4>
                                            <p className="text-slate-600 text-sm">{item.definition}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Miras Section */}
                        {activeTab === 'miras' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 flex flex-col items-center">
                                <div className="w-full bg-indigo-900 text-white rounded-3xl p-8 md:p-12 relative overflow-hidden">
                                    <div className="absolute -bottom-6 -right-6 text-white/10">
                                        <Award size={200} />
                                    </div>
                                    <div className="relative z-10">
                                        <h2 className="text-3xl font-bold mb-6 italic">Peygamberimizin En Büyük Mirası</h2>
                                        <p className="text-lg text-indigo-100 leading-relaxed mb-8">
                                            Ebu Hüreyre Medine pazarına gider ve seslenir: <br/> 
                                            <span className="font-bold">"Resulullah’ın mirası mescitte dağıtılıyor, siz burada bekliyorsunuz!"</span> <br/><br/>
                                            İnsanlar koşa koşa mescide giderler ancak orada altın veya gümüş yoktur. Döndüklerinde Ebu Hüreyre'ye sitem ederler. Ebu Hüreyre sorar: <br/>
                                            <span className="text-emerald-400 font-bold">"Mescitte ne gördünüz?"</span> <br/>
                                            İnsanlar cevap verir: "Kur'an okuyanlar, namaz kılanlar, helal-haram konuşan ilim meclisleri..." <br/><br/>
                                            Ebu Hüreyre taşı gediğine koyar: <br/>
                                            <span className="text-xl font-extrabold text-white underline decoration-emerald-400">"İşte Hz. Muhammed’in (sav) asıl mirası budur!"</span>
                                        </p>
                                        <div className="flex gap-4">
                                            <span className="bg-white/20 px-3 py-1 rounded-lg text-sm">#İlim</span>
                                            <span className="bg-white/20 px-3 py-1 rounded-lg text-sm">#Ahlak</span>
                                            <span className="bg-white/20 px-3 py-1 rounded-lg text-sm">#İbadet</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Quiz Section */}
                        {activeTab === 'quiz' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {!showQuiz ? (
                                    <div className="max-w-xl mx-auto py-10 text-center">
                                        <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-600">
                                            <Lightbulb size={32} />
                                        </div>
                                        <h3 className="text-2xl font-bold text-slate-800 mb-4">Kendini Test Etmeye Hazır mısın?</h3>
                                        <p className="text-slate-500 mb-8">Ünitede öğrendiğin bilgileri 4 soruda test edelim.</p>
                                        <button 
                                            onClick={() => setCurrentQuestion(0)} 
                                            className="bg-emerald-600 text-white px-8 py-4 rounded-full font-bold hover:bg-emerald-700 transition flex items-center gap-2 mx-auto"
                                        >
                                            Teste Başla <ArrowRight size={20} />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="max-w-2xl mx-auto">
                                        <div className="mb-8">
                                            <div className="flex justify-between items-end mb-4">
                                                <span className="text-sm font-bold text-emerald-600 uppercase tracking-wider">Soru {currentQuestion + 1} / {quizQuestions.length}</span>
                                                <span className="text-slate-400 text-xs">Doğru: {score}</span>
                                            </div>
                                            <h3 className="text-xl font-bold text-slate-900 leading-tight">{quizQuestions[currentQuestion].q}</h3>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 gap-3">
                                            {quizQuestions[currentQuestion].a.map((ans, idx) => (
                                                <button
                                                    key={idx}
                                                    onClick={() => handleAnswer(idx)}
                                                    className="text-left p-4 rounded-xl border-2 border-slate-100 hover:border-emerald-300 hover:bg-emerald-50 transition-all font-medium text-slate-700 flex justify-between items-center group"
                                                >
                                                    {ans}
                                                    <CheckCircle2 className="opacity-0 group-hover:opacity-100 text-emerald-500 transition-opacity" size={20} />
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {showQuiz && (
                                    <div className="text-center py-10 animate-in zoom-in duration-500">
                                        <div className="text-6xl mb-4">🏆</div>
                                        <h3 className="text-3xl font-extrabold text-slate-900 mb-2">Harika!</h3>
                                        <p className="text-lg text-slate-600 mb-8">Testi tamamladın. Skorun: <span className="font-bold text-emerald-600">{score} / {quizQuestions.length}</span></p>
                                        <button 
                                            onClick={() => { setShowQuiz(false); setScore(0); setCurrentQuestion(0); }}
                                            className="text-emerald-600 font-bold hover:underline"
                                        >
                                            Tekrar Dene
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* Footer Quote */}
                    <footer className="max-w-5xl mx-auto mt-12 text-center text-slate-400 text-sm">
                        <p>"Andolsun ki, Allah’ın Resulü’nde sizin için; Allah’a ve ahiret gününe kavuşmayı umanlar için güzel bir örnek vardır." (Ahzab, 21)</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
