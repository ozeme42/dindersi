<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Değerler Oyunu - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #loading {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 50; flex-direction: column; gap: 1rem;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">
    <header class="bg-slate-950/80 backdrop-blur-md border-b border-white/10 p-6 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                DEĞERLER OYUNU
            </h1>
        </div>
    </header>
    <main id="content" class="max-w-7xl mx-auto p-6 space-y-8 flex-grow"></main>
    <div id="loading">
        <svg class="animate-spin h-12 w-12 text-cyan-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-white font-medium animate-pulse">Veriler Yükleniyor...</p>
        <p id="error-text" class="text-red-400 text-sm mt-2 hidden"></p>
    </div>
    <script src="app.js"></script>
    <script>
        window.onerror = function(msg, url, line) {
            const loading = document.getElementById('loading');
            const errText = document.getElementById('error-text');
            const p = loading.querySelector('p.animate-pulse');
            if(p) p.style.display = 'none';
            errText.classList.remove('hidden');
            errText.innerHTML = `⚠️ BİR HATA OLUŞTU:<br>${msg}`;
            if(msg.includes('fetch') || msg.includes('Network')) {
                 errText.innerHTML += `<br><br><span class="text-white">İPUCU: Dosyayı çift tıklayarak açtıysanız çalışmaz. VS Code "Live Server" kullanın.</span>`;
            }
        };
    </script>
</body>
</html>
