<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Değerler Eğitimi Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Geçiş Efektleri */
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Özel Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(6, 182, 212, 0.15); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-950/80 backdrop-blur-md border-b border-white/10 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="router.go('home')">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-xl shadow-lg shadow-cyan-500/20">🎓</div>
                <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 hidden sm:block">
                    DEĞERLER OYUNU
                </h1>
            </div>
            <div id="header-actions" class="hidden">
                <button onclick="router.go('home')" class="px-4 py-2 bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 text-sm font-medium transition flex items-center gap-2">
                    <span>←</span> Ana Menü
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow relative">
        
        <div id="view-home" class="view-section active max-w-7xl mx-auto p-6">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-5xl font-black text-white mb-4">Hoş Geldiniz</h2>
                <p class="text-slate-400 text-lg max-w-2xl mx-auto">İnteraktif ders notları, kavram haritaları ve eğitici oyunlarla öğrenmeyi keşfedin.</p>
            </div>
            <div id="courses-container" class="space-y-12"></div>
        </div>

        <div id="view-notes" class="view-section max-w-4xl mx-auto p-6">
            <div class="mb-8 border-b border-white/10 pb-6">
                <span class="text-cyan-400 text-sm font-bold tracking-wider uppercase">Ders İçeriği</span>
                <h2 id="note-title" class="text-3xl font-bold text-white mt-1">Konu Başlığı</h2>
            </div>
            <div id="note-content" class="space-y-8"></div>
        </div>

        <div id="view-games" class="view-section max-w-6xl mx-auto p-6">
            <div class="mb-10 text-center">
                <h2 id="game-title" class="text-3xl font-bold text-white mb-2">Oyun Alanı</h2>
                <p class="text-slate-400">Bu konuyla ilgili etkinlikleri aşağıdan seçebilirsiniz.</p>
            </div>
            <div id="game-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

    </main>

    <div id="loading" class="fixed inset-0 bg-slate-900/90 z-[60] flex flex-col items-center justify-center gap-4">
        <svg class="animate-spin h-12 w-12 text-cyan-500" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="text-cyan-400 font-medium animate-pulse">Sistem Başlatılıyor...</span>
    </div>

    <script src="database.js"></script>

    <script>
        // --- ROUTER & UYGULAMA YÖNETİCİSİ ---
        const App = {
            data: null,

            init: () => {
                // 1. Veri Kontrolü
                const checkData = setInterval(() => {
                    if (typeof window.TUM_VERILER !== 'undefined') {
                        clearInterval(checkData);
                        App.data = window.TUM_VERILER;
                        App.start();
                    }
                }, 100);

                // 5 saniye içinde veri gelmezse hata ver
                setTimeout(() => {
                    if (!App.data) {
                        clearInterval(checkData);
                        alert("HATA: database.js dosyası yüklenemedi veya hatalı!");
                    }
                }, 5000);
            },

            start: () => {
                // Veriyi işle ve Ana Sayfayı doldur
                const formatted = DataManager.transform(App.data);
                UIManager.renderHome(formatted);
                
                // Yükleme ekranını kapat
                document.getElementById('loading').style.display = 'none';
            }
        };

        // --- VERİ İŞLEME MERKEZİ ---
        const DataManager = {
            transform: (db) => {
                return db.classes.map(cls => {
                    const classCourses = db.courses.filter(c => c.classId === cls.id);
                    return {
                        name: cls.name + ". Sınıf",
                        courses: classCourses.map(course => ({
                            id: course.id,
                            name: course.title,
                            units: course.units.map(unit => ({
                                name: unit.title,
                                topics: unit.topics.map(topic => ({
                                    id: topic.id,
                                    name: topic.title
                                }))
                            }))
                        }))
                    };
                });
            },

            getTopicData: (topicId) => {
                // Veri tabanında derinlemesine arama
                let result = { id: topicId, name: '', questions: [], activities: [], definitions: [], notes: [] };
                const db = App.data;

                // Sorular
                if (db.questions) result.questions = db.questions.filter(q => q.topicId === topicId);

                // Ders ağacından aktiviteleri ve içerikleri bul
                db.courses.forEach(c => c.units.forEach(u => {
                    const t = u.topics.find(topic => topic.id === topicId);
                    if (t) {
                        result.name = t.title;
                        // Notlar/Kavramlar
                        if (t.writingContent) {
                            result.definitions = t.writingContent.conceptDefinitions || [];
                            result.notes = t.writingContent.notes || [];
                        }
                        // Aktiviteler
                        if (t.steps) {
                            result.activities = t.steps.filter(s => 
                                ['anagramGame', 'matching', 'quiz', 'ordering', 'wordHunt'].includes(s.type) || s.activityType
                            );
                        }
                    }
                }));
                return result;
            }
        };

        // --- GÖRÜNÜM VE SAYFA GEÇİŞLERİ ---
        const router = {
            go: (viewName, params = null) => {
                // Tüm sayfaları gizle
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                
                // Seçilen sayfayı göster
                const target = document.getElementById(`view-${viewName}`);
                if (target) target.classList.add('active');

                // Header butonunu ayarla
                const backBtn = document.getElementById('header-actions');
                backBtn.style.display = viewName === 'home' ? 'none' : 'block';

                // Sayfa içeriğini yükle
                if (viewName === 'notes' && params) UIManager.renderNotes(params);
                if (viewName === 'games' && params) UIManager.renderGames(params);
                
                // Sayfayı yukarı kaydır
                window.scrollTo(0,0);
            }
        };

        // --- ARAYÜZ OLUŞTURUCU (RENDER) ---
        const UIManager = {
            renderHome: (data) => {
                const container = document.getElementById('courses-container');
                if(data.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-500">İçerik bulunamadı.</div>';
                    return;
                }

                container.innerHTML = data.map(group => `
                    <div>
                        <h3 class="text-2xl font-bold text-cyan-400 mb-6 border-b border-white/10 pb-2 pl-2">${group.name}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${group.courses.map(course => `
                                <div class="bg-slate-800/50 rounded-xl p-6 border border-white/5 hover:border-cyan-500/30 transition duration-300 card-hover group">
                                    <h4 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                                        <span class="p-2 bg-slate-900 rounded-lg text-2xl">📖</span> ${course.name}
                                    </h4>
                                    <div class="space-y-4">
                                        ${course.units.map(unit => `
                                            <div class="pl-4 border-l-2 border-white/10 group-hover:border-cyan-500/30 transition">
                                                <h5 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">${unit.name}</h5>
                                                <ul class="space-y-2">
                                                    ${unit.topics.map(topic => `
                                                        <li class="flex items-center justify-between gap-2 bg-slate-900/40 p-2.5 rounded-lg hover:bg-slate-900 transition border border-transparent hover:border-white/10">
                                                            <span class="text-slate-200 text-sm font-medium truncate flex-1">${topic.name}</span>
                                                            <div class="flex gap-2 shrink-0">
                                                                <button onclick="router.go('notes', '${topic.id}')" class="px-2 py-1.5 bg-blue-600/10 text-blue-400 text-xs rounded hover:bg-blue-600 hover:text-white transition">Notlar</button>
                                                                <button onclick="router.go('games', '${topic.id}')" class="px-2 py-1.5 bg-green-600/10 text-green-400 text-xs rounded hover:bg-green-600 hover:text-white transition">Oyunlar</button>
                                                            </div>
                                                        </li>
                                                    `).join('')}
                                                </ul>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            },

            renderNotes: (topicId) => {
                const data = DataManager.getTopicData(topicId);
                document.getElementById('note-title').textContent = data.name;
                const container = document.getElementById('note-content');
                let html = '';

                // Kavramlar
                if (data.definitions.length > 0) {
                    html += `
                        <div class="bg-slate-800/40 rounded-xl p-6 border border-white/5">
                            <h3 class="text-xl font-bold text-cyan-400 mb-4 flex items-center gap-2"><span class="text-2xl">💡</span> Kavramlar</h3>
                            <div class="grid gap-4 md:grid-cols-2">
                                ${data.definitions.map(def => `
                                    <div class="bg-slate-900 p-4 rounded-lg border-l-4 border-cyan-500">
                                        <div class="font-bold text-white mb-1">${def.term || def.concept}</div>
                                        <div class="text-sm text-slate-400">${def.definition}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                // Notlar
                if (data.notes.length > 0) {
                    html += `
                        <div class="bg-slate-800/40 rounded-xl p-6 border border-white/5">
                            <h3 class="text-xl font-bold text-purple-400 mb-4 flex items-center gap-2"><span class="text-2xl">📌</span> Notlar</h3>
                            <ul class="space-y-3">
                                ${data.notes.map(note => `
                                    <li class="flex gap-3 text-slate-300 bg-slate-900/50 p-3 rounded-lg">
                                        <span class="text-purple-500 font-bold">➤</span>
                                        <span class="leading-relaxed">${note}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }

                if (html === '') html = '<div class="text-center py-10 text-slate-500">Bu konu için henüz içerik eklenmemiş.</div>';
                container.innerHTML = html;
            },

            renderGames: (topicId) => {
                const data = DataManager.getTopicData(topicId);
                document.getElementById('game-title').textContent = data.name;
                const container = document.getElementById('game-list');
                let html = '';

                // Test Kartı
                if (data.questions.length > 0) {
                    html += UIManager.createGameCard({
                        name: 'Konu Testi',
                        desc: `${data.questions.length} soruluk değerlendirme`,
                        icon: '📝',
                        color: 'from-blue-500 to-cyan-500',
                        action: "alert('Test modülü buraya entegre edilecek.')"
                    });
                }

                // Diğer Oyunlar
                data.activities.forEach(act => {
                    let info = { name: act.title || 'Etkinlik', icon: '🎮', color: 'from-purple-500 to-pink-500' };
                    if(act.type === 'anagramGame') info = { name: 'Kelime Bulmaca', icon: 'abc', color: 'from-yellow-500 to-orange-500' };
                    if(act.type === 'matching') info = { name: 'Eşleştirme', icon: '⇄', color: 'from-green-500 to-emerald-500' };
                    
                    html += UIManager.createGameCard({
                        name: info.name,
                        desc: 'İnteraktif Alıştırma',
                        icon: info.icon,
                        color: info.color,
                        action: `alert('${info.name} başlatılıyor...')`
                    });
                });

                if (html === '') html = '<div class="col-span-full text-center py-10 text-slate-500">Aktif oyun bulunamadı.</div>';
                container.innerHTML = html;
            },

            createGameCard: (props) => {
                return `
                    <div onclick="${props.action}" class="group cursor-pointer relative overflow-hidden bg-slate-800 rounded-2xl p-6 border border-white/5 hover:border-white/20 transition-all hover:-translate-y-1 hover:shadow-xl hover:shadow-cyan-500/10">
                        <div class="absolute inset-0 bg-gradient-to-br ${props.color} opacity-0 group-hover:opacity-10 transition duration-500"></div>
                        <div class="relative z-10 flex flex-col items-center text-center gap-4">
                            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br ${props.color} flex items-center justify-center text-3xl shadow-lg text-white mb-2">
                                ${props.icon}
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-white mb-1 group-hover:text-cyan-400 transition">${props.name}</h3>
                                <p class="text-xs text-slate-400">${props.desc}</p>
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        // Uygulamayı Başlat
        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
