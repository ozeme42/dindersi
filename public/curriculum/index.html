<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Değerler Eğitimi Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        /* --- GENEL --- */
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a; 
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: white; 
            user-select: none; -webkit-user-select: none; 
        }
        
        /* --- HATA KUTUSU --- */
        #debug-console { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; 
            overflow: auto; display: none; font-family: monospace; color: #ff5555;
            user-select: text !important; -webkit-user-select: text !important; 
        }
        .debug-row { border-bottom: 1px solid #333; padding: 10px 0; font-size: 14px; }

        /* --- ORTAK ANİMASYON --- */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shake { animation: shake 0.4s; border-color: #ef4444 !important; color: #ef4444 !important; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* --- UI --- */
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accordion-content { display: grid; grid-template-rows: 0fr; transition: 0.3s; overflow: hidden; }
        .accordion-content.open { grid-template-rows: 1fr; }
        .tab-btn.active { background: linear-gradient(90deg, #06b6d4, #3b82f6); border: none; }

        /* --- OYUN ÖGELERİ --- */
        .game-slot { width: 50px; height: 60px; background: rgba(255,255,255,0.1); border-bottom: 4px solid rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; transition: 0.3s; }
        .game-slot.filled { background: #10b981; border-bottom-color: #047857; transform: scale(1.1); }
        .letter-btn { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; box-shadow: 0 6px 0 rgba(0,0,0,0.3); cursor: pointer; top: 0; position: relative; border: 1px solid white; transition: 0.1s; }
        .letter-btn:active { top: 6px; box-shadow: none; }
        .letter-btn.used { transform: scale(0); opacity: 0; pointer-events: none; }
        .c-1 { background: #f59e0b; } .c-2 { background: #3b82f6; } .c-3 { background: #ec4899; } .c-4 { background: #8b5cf6; } .c-5 { background: #10b981; }

        /* --- EŞLEŞTİRME --- */
        .match-container { display: flex; gap: 20px; width: 100%; max-width: 1000px; justify-content: center; padding: 10px; }
        .match-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .match-item { background: #1e293b; border: 2px solid #334155; padding: 15px; border-radius: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; text-align: center; min-height: 80px; font-weight: 600; font-size: 0.9rem; color: #cbd5e1; position: relative; }
        .match-item.selected { background: #3b82f6; border-color: #60a5fa; color: white; transform: scale(1.02); z-index: 10; }
        .match-item.matched { cursor: default; transform: scale(1); pointer-events: none; border-color: white; color: white; font-weight: 800; opacity: 0.9; }
        .m-color-0 { background: #059669 !important; border-color: #34d399 !important; }
        .m-color-1 { background: #7c3aed !important; border-color: #a78bfa !important; }
        .m-color-2 { background: #db2777 !important; border-color: #f472b6 !important; }
        .m-color-3 { background: #ea580c !important; border-color: #fb923c !important; }
        .m-color-4 { background: #0891b2 !important; border-color: #22d3ee !important; }
        .m-color-5 { background: #4f46e5 !important; border-color: #818cf8 !important; }
        @media (max-width: 768px) { .match-container { flex-direction: row; gap: 10px; } .match-item { min-height: 60px; font-size: 0.75rem; padding: 10px; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="debug-console">
        <div class="flex justify-between items-center border-b border-red-500 pb-2 mb-4">
            <h2 class="text-2xl font-bold text-white">⚠️ HATA RAPORU</h2>
            <button onclick="copyErrorText()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold text-sm">📋 Kopyala</button>
        </div>
        <p style="color:#aaa; margin-bottom:20px;">Aşağıdaki hatayı kopyalayıp geliştiriciye gönderin:</p>
        <div id="debug-content" class="bg-gray-900 p-4 rounded border border-gray-700 select-text mb-4"></div>
        <button onclick="location.reload()" class="px-6 py-2 bg-gray-700 text-white border border-gray-500 rounded hover:bg-gray-600">Yeniden Dene</button>
    </div>

    <header class="fixed top-0 w-full z-40 bg-slate-900/90 backdrop-blur border-b border-white/10 h-16 flex items-center justify-between px-4">
        <div class="flex items-center gap-2" onclick="location.reload()">
            <div class="w-8 h-8 rounded bg-gradient-to-tr from-cyan-500 to-blue-500 flex items-center justify-center text-lg">🎓</div>
            <h1 class="font-bold text-lg tracking-tight">DEĞERLER <span class="text-cyan-400 text-xs font-normal">PORTALI</span></h1>
        </div>
        <div id="header-actions" class="hidden">
            <button onclick="router.go('home')" class="bg-slate-800 px-3 py-1.5 rounded text-sm hover:bg-slate-700 transition">🏠 Ana Menü</button>
        </div>
    </header>

    <main class="flex-grow pt-20 pb-10 px-4 relative z-10 max-w-7xl mx-auto w-full">
        <div id="view-home" class="view-section active">
            <div class="text-center mb-8 fade-in">
                <h2 class="text-3xl md:text-5xl font-black mb-2">Hoş Geldiniz</h2>
                <p class="text-slate-400">Sınıfınızı seçin ve derse başlayın.</p>
            </div>
            <div id="class-tabs" class="flex flex-wrap justify-center gap-2 mb-8"></div>
            <div id="courses-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="view-notes" class="view-section hidden">
            <h2 id="note-title" class="text-2xl font-bold text-center mb-6 text-cyan-400">...</h2>
            <div id="note-content" class="space-y-6 max-w-3xl mx-auto"></div>
        </div>

        <div id="view-games" class="view-section hidden">
            <h2 id="game-title" class="text-2xl font-bold text-center mb-2">...</h2>
            <p class="text-center text-slate-400 mb-8">Oynamak istediğiniz etkinliği seçin.</p>
            <div id="game-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-w-4xl mx-auto"></div>
        </div>
    </main>

    <div id="game-modal" class="fixed inset-0 z-50 hidden bg-slate-900 flex flex-col">
        <div class="h-16 bg-slate-800 flex items-center justify-between px-4 shadow-xl z-10 border-b border-white/10">
            <button onclick="closeGameModal()" class="w-10 h-10 bg-red-500/20 text-red-400 hover:bg-red-600 hover:text-white transition rounded-full font-bold text-xl">✕</button>
            <h3 id="modal-game-title" class="font-bold text-lg text-white tracking-widest">OYUN</h3>
            <div id="game-score" class="px-4 py-1 bg-green-600 rounded-full font-bold text-white text-sm shadow-lg">PUAN: 0</div>
        </div>
        <div id="game-stage" class="flex-grow relative overflow-y-auto flex flex-col items-center justify-center p-4 bg-slate-900"></div>
    </div>

    <div id="loading" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-slate-700 border-t-cyan-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-400 animate-pulse font-medium">Veriler Hazırlanıyor...</p>
    </div>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            const box = document.getElementById('debug-console');
            const content = document.getElementById('debug-content');
            box.style.display = 'block';
            let file = url ? url.split('/').pop() : 'Bilinmeyen';
            content.innerHTML += `<div class="debug-row"><strong style="color:#fff">HATA:</strong> ${msg}<br><strong style="color:#aaa">Dosya:</strong> ${file} (Satır: ${line})</div>`;
            document.getElementById('loading').style.display = 'none';
            return false;
        };
        function copyErrorText() {
            const text = document.getElementById('debug-content').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Kopyalandı!")).catch(() => alert("Seçerek kopyalayın."));
        }
    </script>

    <script src="database.js"></script>
    <script src="icerik.js"></script>
    <script src="oyunlar.js"></script>

    <script>
        const App = {
            data: null, activeClassFilter: null, currentGameTopicId: null,
            init: () => {
                let attempts = 0;
                const checkData = setInterval(() => {
                    attempts++;
                    if (typeof window.TUM_VERILER !== 'undefined') {
                        clearInterval(checkData);
                        let mainData = window.TUM_VERILER;
                        if (typeof window.EK_ICERIKLER !== 'undefined') {
                            mainData = DataManager.mergeContent(mainData, window.EK_ICERIKLER);
                        }
                        App.data = mainData;
                        App.start();
                    }
                    if (attempts > 50) { 
                        clearInterval(checkData);
                        throw new Error("database.js yüklenemedi! Dosya içeriğini kontrol edin.");
                    }
                }, 100);
            },
            start: () => {
                try {
                    const formatted = DataManager.transform(App.data);
                    if (formatted.length > 0) App.activeClassFilter = formatted[0].name;
                    UIManager.renderHome(formatted);
                    document.getElementById('loading').style.display = 'none';
                } catch (e) {
                    throw new Error("Veri işlenirken hata: " + e.message);
                }
            }
        };

        const DataManager = {
            // İÇERİK BİRLEŞTİRME (GÜNCELLENMİŞ GARANTİ YÖNTEM)
            mergeContent: (db, ext) => {
                const normalize = s => s ? s.toLowerCase().replace(/\s+/g,'').replace(/i/g,'ı').replace(/ı/g,'i') : '';
                
                ext.forEach(item => {
                    // DERS BULMA (Hem title hem name kontrolü)
                    const c = db.courses.find(x => {
                        const dbName = x.title || x.name || "";
                        const extName = item.courseName || item.courseTitle || "";
                        return normalize(dbName) === normalize(extName);
                    });

                    if(c) {
                        // ÜNİTE BULMA
                        const u = c.units.find(x => {
                            const dbUnit = x.title || x.name || "";
                            const extUnit = item.unitName || item.unitTitle || "";
                            return normalize(dbUnit).includes(normalize(extUnit)) || normalize(extUnit).includes(normalize(dbUnit));
                        });

                        if(u) {
                            // KONU BULMA
                            const t = u.topics.find(x => {
                                const dbTopic = x.title || x.name || "";
                                const extTopic = item.topicName || item.topicTitle || "";
                                return normalize(dbTopic) === normalize(extTopic);
                            });

                            if(t) { 
                                // Eşleşme Başarılı! Veriyi ekle.
                                t.writingContent = item.writingContent; 
                                t.customUrl = item.url; 
                            }
                        }
                    }
                });
                return db;
            },
            sortItems: arr => arr ? arr.sort((a,b) => (a.order||0)-(b.order||0) || (a.name||a.title||'').localeCompare(b.name||b.title||'', undefined, {numeric:true})) : [],
            transform: db => {
                if (!db.classes) throw new Error("database.js bozuk: 'classes' dizisi bulunamadı.");
                let classes = DataManager.sortItems([...db.classes]);
                return classes.map(cls => {
                    let courses = DataManager.sortItems(db.courses.filter(c => c.classId === cls.id));
                    return {
                        name: cls.name + ". Sınıf",
                        courses: courses.map(c => ({
                            name: c.title || c.name, // Garanti isim
                            units: DataManager.sortItems([...c.units]).map(u => ({
                                name: u.title || u.name,
                                topics: DataManager.sortItems([...u.topics]).map(t => ({
                                    id: t.id, 
                                    name: t.title || t.name, 
                                    url: t.customUrl
                                }))
                            }))
                        }))
                    };
                });
            },
            getTopicData: (id) => {
                let res = { id, name:'', definitions:[], notes:[] };
                App.data.courses.forEach(c => c.units.forEach(u => {
                    const t = u.topics.find(x => x.id === id);
                    if(t) {
                        res.name = t.title || t.name;
                        if(t.writingContent) {
                            res.definitions = t.writingContent.conceptDefinitions || [];
                            res.notes = t.writingContent.notes || [];
                        }
                    }
                }));
                return res;
            }
        };

        const router = {
            go: (view, params) => {
                document.querySelectorAll('.view-section').forEach(el => { el.classList.remove('active'); el.classList.add('hidden'); });
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.getElementById(`view-${view}`).classList.add('active');
                
                const btn = document.getElementById('header-actions');
                view === 'home' ? btn.classList.add('hidden') : btn.classList.remove('hidden');

                if (view === 'notes') UIManager.renderNotes(params);
                if (view === 'games') { App.currentGameTopicId = params; UIManager.renderGames(params); }
                window.scrollTo(0,0);
            }
        };

        const UIManager = {
            renderHome: (data) => {
                const tabs = document.getElementById('class-tabs');
                const list = document.getElementById('courses-container');
                tabs.innerHTML = data.map(g => `<button onclick="UIManager.switchTab('${g.name}')" class="tab-btn px-6 py-3 rounded-xl border border-white/10 bg-slate-800 text-slate-300 font-bold transition transform hover:scale-105 ${g.name === App.activeClassFilter ? 'active' : ''}">${g.name}</button>`).join('');
                
                const group = data.find(g => g.name === App.activeClassFilter);
                if(!group || group.courses.length === 0) { list.innerHTML = '<div class="text-center w-full py-10 opacity-50">İçerik yok.</div>'; return; }

                list.innerHTML = group.courses.map((c, i) => `
                    <div class="glass-card rounded-2xl overflow-hidden fade-in" style="animation-delay:${i*100}ms">
                        <div class="p-4 border-b border-white/10 bg-white/5 font-bold flex items-center gap-2"><span class="text-2xl">📘</span> ${c.name}</div>
                        <div class="p-4 space-y-2">
                            ${c.units.map(u => `
                                <div class="pl-3 border-l-2 border-slate-600 transition hover:border-cyan-500">
                                    <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full text-left text-xs font-bold text-slate-400 uppercase py-1 hover:text-white transition flex justify-between">${u.name} <span>▼</span></button>
                                    <div class="hidden mt-1 space-y-1">
                                        ${u.topics.map(t => `
                                            <div class="flex justify-between items-center bg-white/5 p-2 rounded hover:bg-white/10 transition">
                                                <span class="text-sm truncate w-32 md:w-auto cursor-pointer font-medium" onclick="${t.url ? `window.open('${t.url}')` : ''}">${t.name} ${t.url?'🔗':''}</span>
                                                <div class="flex gap-1">
                                                    <button onclick="router.go('notes', '${t.id}')" class="px-2 py-1 bg-blue-600/30 text-blue-300 rounded text-xs hover:bg-blue-600 hover:text-white transition">Not</button>
                                                    <button onclick="router.go('games', '${t.id}')" class="px-2 py-1 bg-purple-600/30 text-purple-300 rounded text-xs hover:bg-purple-600 hover:text-white transition">Oyun</button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            },
            switchTab: (name) => { App.activeClassFilter = name; UIManager.renderHome(DataManager.transform(App.data)); },
            renderNotes: (id) => {
                const d = DataManager.getTopicData(id);
                document.getElementById('note-title').textContent = d.name;
                let html = '';
                if(d.definitions.length) html += `<div class="glass-card p-6 rounded-2xl"><h3 class="text-xl font-bold text-yellow-400 mb-4">💡 Kavramlar</h3><div class="grid gap-3 md:grid-cols-2">${d.definitions.map(x => `<div class="bg-slate-800 p-3 rounded border-l-4 border-yellow-500 hover:bg-slate-700 transition"><strong>${x.term||x.concept}</strong>: ${x.definition}</div>`).join('')}</div></div>`;
                if(d.notes.length) html += `<div class="glass-card p-6 rounded-2xl mt-4"><h3 class="text-xl font-bold text-purple-400 mb-4">📌 Notlar</h3><ul class="space-y-2">${d.notes.map(n => `<li class="flex gap-2 text-slate-300"><span class="text-purple-500 font-bold">➤</span>${n}</li>`).join('')}</ul></div>`;
                if(!html) html = '<div class="text-center text-slate-500 py-10 border border-dashed border-slate-700 rounded-xl">Bu konu için henüz içerik eklenmemiş.</div>';
                document.getElementById('note-content').innerHTML = html;
            },
            renderGames: (id) => {
                const d = DataManager.getTopicData(id);
                document.getElementById('game-title').textContent = d.name;
                document.getElementById('game-list').innerHTML = `
                    <div onclick="openGame('quiz')" class="glass-card p-6 rounded-2xl flex flex-col items-center cursor-pointer hover:bg-white/5 transition border border-white/5 hover:border-emerald-500/50">
                        <div class="text-4xl mb-2">⚡</div>
                        <h3 class="font-bold text-lg">Kavram Yarışması</h3>
                        <p class="text-xs text-slate-400 mt-1">Süreli bilgi yarışması.</p>
                    </div>
                    <div onclick="openGame('anagram')" class="glass-card p-6 rounded-2xl flex flex-col items-center cursor-pointer hover:bg-white/5 transition border border-white/5 hover:border-orange-500/50">
                        <div class="text-4xl mb-2">🔤</div>
                        <h3 class="font-bold text-lg">Kelime Bulmaca</h3>
                        <p class="text-xs text-slate-400 mt-1">Harfleri birleştir, kavramı bul.</p>
                    </div>
                    <div onclick="openGame('matching')" class="glass-card p-6 rounded-2xl flex flex-col items-center cursor-pointer hover:bg-white/5 transition border border-white/5 hover:border-blue-500/50">
                        <div class="text-4xl mb-2">🧩</div>
                        <h3 class="font-bold text-lg">Eşleştirme</h3>
                        <p class="text-xs text-slate-400 mt-1">Kavramları tanımlarıyla eşleştir.</p>
                    </div>
                    <div onclick="openGame('hangman')" class="glass-card p-6 rounded-2xl flex flex-col items-center cursor-pointer hover:bg-white/5 transition border border-white/5 hover:border-purple-500/50">
                        <div class="text-4xl mb-2">😵</div>
                        <h3 class="font-bold text-lg">Adam Asmaca</h3>
                        <p class="text-xs text-slate-400 mt-1">Harf tahmin et, kelimeyi kurtar.</p>
                    </div>
                `;
            }
        };

        // --- GLOBAL OYUN KÖPRÜSÜ ---
        window.openGame = (type) => {
            if (typeof GameEngine === 'undefined') { alert("Oyun motoru yüklenemedi! (oyunlar.js)"); return; }
            
            // Veriyi al
            const data = DataManager.getTopicData(App.currentGameTopicId);
            const defs = data.definitions;

            // Veri Kontrolü
            if (!defs || defs.length === 0) {
                alert("Bu oyun için veri (kavram) eksik. Lütfen Admin panelinden ekleyin.");
                return;
            }

            const modal = document.getElementById('game-modal');
            const title = document.getElementById('modal-game-title');
            const score = document.getElementById('game-score');
            
            modal.classList.remove('hidden');
            score.textContent = "Puan: 0";

            if (type === 'quiz') {
                title.textContent = 'KAVRAM YARIŞMASI';
                GameEngine.startQuiz(defs);
            } else if (type === 'anagram') {
                title.textContent = 'KELİME BULMACA';
                GameEngine.startAnagram(defs);
            } else if (type === 'matching') {
                title.textContent = 'EŞLEŞTİRME';
                GameEngine.startMatching(defs);
            } else if (type === 'hangman') {
                title.textContent = 'ADAM ASMACA';
                GameEngine.startHangman(defs);
            }
        };

        window.closeGameModal = () => {
            document.getElementById('game-modal').classList.add('hidden');
            document.getElementById('game-stage').innerHTML = '';
        };

        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
