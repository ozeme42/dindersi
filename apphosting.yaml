# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

build:
  # This is the command to install your application's dependencies.
  # If you are using a different package manager, please update this command.
  - npm install

  # This is the command to build your application.
  # If you are using a different build command, please update this command.
  - npm run build

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
